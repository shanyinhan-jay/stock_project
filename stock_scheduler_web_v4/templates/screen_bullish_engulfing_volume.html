<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>阳线反包放量阴线筛选</title>
  <link rel="stylesheet" href="/static/style.css">

  <style>
    #result-table {
      font-size: 12px;
      table-layout: auto;
      width: max-content;
      min-width: 100%;
    }
    #result-table th,
    #result-table td {
      white-space: nowrap;
      padding: 6px 10px;
      vertical-align: top;
    }
    #result-table th.name-col,
    #result-table td.name-col {
      min-width: 140px;
      max-width: 220px;
    }
  </style>

</head>
<body>
  <div class="container">
    <h1>阳线反包放量阴线筛选</h1>
    <p class="muted">由 8010 后端代理调用 8000 的 <code>/screen/bullish-engulfing-volume</code> 接口。</p>

    <p>
      <a class="button secondary" href="/">返回任务管理</a>
    </p>

    <div class="card">
      <form id="screen-form">
        <label>交易日</label>
        <input type="text" id="trade_date" value="" placeholder="例如 20260319" required>

        <label>复权方式</label>
        <select id="adj">
          <option value="qfq" selected>前复权 qfq</option>
          <option value="hfq">后复权 hfq</option>
          <option value="none">不复权 none</option>
        </select>

        <label>当天较前一天成交量</label>
        <select id="volume_mode">
          <option value="any" selected>不限</option>
          <option value="shrink">缩量</option>
          <option value="expand">放量</option>
        </select>

        <label>最小实体比例</label>
        <input type="number" id="min_body_pct" value="0.01" min="0" max="0.2" step="0.001">

        <div class="row">
          <button type="submit">开始筛选</button>
          <button type="button" id="export-btn" class="button secondary" disabled>导出当前结果 CSV</button>
        </div>
      </form>
    </div>

    <h3>形态定义</h3>
    <div class="card muted">
      最近两个交易日满足：<br>
      1）前一天为放量阴线：收阴线，且成交量大于它的前一个交易日；<br>
      2）当天为阳线反包：当日开盘价不高于前一日收盘价，且当日收盘价不低于前一日开盘价；<br>
      3）当天成交量可选：不限 / 较前一天缩量 / 较前一天放量；<br>
      4）为排除很小的 K 线，前一天和当天实体比例都必须不低于“最小实体比例”。<br>
    </div>

    <h3>筛选结果摘要</h3>
    <div id="summary" class="card muted">还没有执行筛选。</div>

    <h3>筛选结果预览</h3>
    <div class="card" style="overflow:auto;">
      <table id="result-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
let currentRows = [];
let currentColumns = [];

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}${m}${day}`;
}

function toCsvValue(v) {
  if (v === null || v === undefined) return "";
  const s = String(v);
  if (s.includes('"') || s.includes(',') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function exportCurrentCsv() {
  if (!currentRows.length || !currentColumns.length) return;
  const lines = [];
  lines.push(currentColumns.map(toCsvValue).join(","));
  currentRows.forEach(row => {
    lines.push(currentColumns.map(col => toCsvValue(row[col])).join(","));
  });

  const csvContent = "\ufeff" + lines.join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const tradeDate = document.getElementById("trade_date").value.trim() || "unknown";
  const filename = `bullish_engulfing_volume_${tradeDate}.csv`;

  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

document.getElementById("trade_date").value = todayStr();
document.getElementById("export-btn").addEventListener("click", exportCurrentCsv);

document.getElementById("screen-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const trade_date = document.getElementById("trade_date").value.trim();
  const adj = document.getElementById("adj").value;
  const volume_mode = document.getElementById("volume_mode").value;
  const min_body_pct = document.getElementById("min_body_pct").value;

  const url = `/api/proxy/screen/bullish-engulfing-volume?trade_date=${trade_date}&adj=${adj}&volume_mode=${volume_mode}&min_body_pct=${min_body_pct}&include_name=true`;

  document.getElementById("summary").innerText = "筛选中...";
  document.querySelector("#result-table thead").innerHTML = "";
  document.querySelector("#result-table tbody").innerHTML = "";
  document.getElementById("export-btn").disabled = true;
  currentRows = [];
  currentColumns = [];

  try {
    const resp = await fetch(url, { method: "POST" });
    const data = await resp.json();

    if (!resp.ok) {
      document.getElementById("summary").innerText = data.detail || "筛选失败";
      return;
    }

    document.getElementById("summary").innerText =
      `交易日: ${data.trade_date} | 复权: ${data.adj} | 成交量要求: ${data.volume_mode} | 最小实体比例: ${data.min_body_pct} | 结果数: ${data.rows}`;

    const rows = data.data || [];
    if (rows.length === 0) {
      document.querySelector("#result-table thead").innerHTML = "";
      document.querySelector("#result-table tbody").innerHTML = "<tr><td class='muted'>没有结果</td></tr>";
      return;
    }

    const columns = Object.keys(rows[0]);
    currentRows = rows;
    currentColumns = columns;
    document.getElementById("export-btn").disabled = false;

    const thead = document.querySelector("#result-table thead");
    const tbody = document.querySelector("#result-table tbody");

    thead.innerHTML = "<tr>" + columns.map(c => `<th>${c}</th>`).join("") + "</tr>";
    tbody.innerHTML = rows.slice(0, 300).map(r => {
      return "<tr>" + columns.map(c => `<td>${r[c] ?? ""}</td>`).join("") + "</tr>";
    }).join("");

    const nameIndex = columns.indexOf("name");
    if (nameIndex >= 0) {
      const nameTh = thead.querySelector(`th:nth-child(${nameIndex + 1})`);
      if (nameTh) nameTh.classList.add("name-col");
      tbody.querySelectorAll("tr").forEach(tr => {
        const td = tr.querySelector(`td:nth-child(${nameIndex + 1})`);
        if (td) td.classList.add("name-col");
      });
    }

  } catch (err) {
    document.getElementById("summary").innerText = "请求失败: " + err;
  }
});
</script>
</body>
</html>
