
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>新高筛选</title>
  <link rel="stylesheet" href="/static/style.css">

  <style>
    #result-table {
      font-size: 12px;
      table-layout: auto;
      width: max-content;
      min-width: 100%;
    }
    #result-table th,
    #result-table td {
      white-space: nowrap;
      padding: 6px 10px;
      vertical-align: top;
    }
    #result-table th.name-col,
    #result-table td.name-col {
      min-width: 140px;
      max-width: 220px;
    }
  </style>

</head>
<body>
  <div class="container">
    <h1>新高筛选</h1>
    <p class="muted">由 8010 后端代理调用 8000 的 <code>/screen/new-high</code> 接口，避免浏览器跨域。</p>

    <p>
      <a class="button secondary" href="/">返回任务管理</a>
    </p>

    <div class="card">
      <form id="screen-form">
        <label>交易日</label>
        <input type="text" id="trade_date" value="" placeholder="例如 20260319" required>

        <label>交易日窗口</label>
        <select id="trading_days">
          <option value="250" selected>250 日</option>
          <option value="120">120 日</option>
          <option value="60">60 日</option>
        </select>

        <label>最近触发天数</label>
        <input type="number" id="recent_days" value="5" min="1" max="30">

        <label>复权方式</label>
        <select id="adj">
          <option value="qfq" selected>前复权 qfq</option>
          <option value="hfq">后复权 hfq</option>
          <option value="none">不复权 none</option>
        </select>

        <label>新高口径</label>
        <select id="price_field">
          <option value="high" selected>最高价 high</option>
          <option value="close">收盘价 close</option>
        </select>

        <label>长上影线</label>
        <select id="upper_shadow_filter">
          <option value="any" selected>不限</option>
          <option value="yes">仅带长上影线</option>
          <option value="no">仅不带长上影线</option>
        </select>

        <div class="row">
          <button type="submit">开始筛选</button>
          <button type="button" id="export-btn" class="button secondary" disabled>导出当前结果 CSV</button>
        </div>
      </form>
    </div>

    <h3>筛选结果摘要</h3>
    <div id="summary" class="card muted">还没有执行筛选。</div>

    <h3>筛选结果预览</h3>
    <div class="card" style="overflow:auto;">
      <table id="result-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
let currentRows = [];
let currentColumns = [];

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}${m}${day}`;
}

function toCsvValue(v) {
  if (v === null || v === undefined) return "";
  const s = String(v);
  if (s.includes('"') || s.includes(',') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function exportCurrentCsv() {
  if (!currentRows.length || !currentColumns.length) return;

  const lines = [];
  lines.push(currentColumns.map(toCsvValue).join(","));
  currentRows.forEach(row => {
    lines.push(currentColumns.map(col => toCsvValue(row[col])).join(","));
  });

  const csvContent = "\ufeff" + lines.join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const tradeDate = document.getElementById("trade_date").value.trim() || "unknown";
  const tradingDays = document.getElementById("trading_days").value;
  const recentDays = document.getElementById("recent_days").value;
  const priceField = document.getElementById("price_field").value;
  const upperShadowFilter = document.getElementById("upper_shadow_filter").value;
  const filename = `new_high_${tradeDate}_${tradingDays}d_recent${recentDays}_${priceField}_${upperShadowFilter}.csv`;

  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

document.getElementById("trade_date").value = todayStr();
document.getElementById("export-btn").addEventListener("click", exportCurrentCsv);

document.getElementById("screen-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const trade_date = document.getElementById("trade_date").value.trim();
  const trading_days = document.getElementById("trading_days").value;
  const recent_days = document.getElementById("recent_days").value;
  const adj = document.getElementById("adj").value;
  const price_field = document.getElementById("price_field").value;
  const upper_shadow_filter = document.getElementById("upper_shadow_filter").value;

  const url = `/api/proxy/screen/new-high?trade_date=${trade_date}&trading_days=${trading_days}&recent_days=${recent_days}&adj=${adj}&price_field=${price_field}&upper_shadow_filter=${upper_shadow_filter}&include_name=true`;

  document.getElementById("summary").innerText = "筛选中...";
  document.querySelector("#result-table thead").innerHTML = "";
  document.querySelector("#result-table tbody").innerHTML = "";
  document.getElementById("export-btn").disabled = true;
  currentRows = [];
  currentColumns = [];

  try {
    const resp = await fetch(url, { method: "POST" });
    const data = await resp.json();

    if (!resp.ok) {
      document.getElementById("summary").innerText = data.detail || "筛选失败";
      return;
    }

    document.getElementById("summary").innerText =
      `交易日: ${data.trade_date} | 窗口: ${data.trading_days} | 最近天数: ${data.recent_days} | 复权: ${data.adj} | 口径: ${data.price_field} | 长上影线: ${data.upper_shadow_filter} | 结果数: ${data.rows}`;

    const rows = data.data || [];
    if (rows.length === 0) {
      document.querySelector("#result-table thead").innerHTML = "";
      document.querySelector("#result-table tbody").innerHTML = "<tr><td class='muted'>没有结果</td></tr>";
      return;
    }

    const columns = Object.keys(rows[0]);
    currentRows = rows;
    currentColumns = columns;
    document.getElementById("export-btn").disabled = false;

    const thead = document.querySelector("#result-table thead");
    const tbody = document.querySelector("#result-table tbody");

    thead.innerHTML = "<tr>" + columns.map(c => `<th>${c}</th>`).join("") + "</tr>";
    tbody.innerHTML = rows.slice(0, 300).map(r => {
      return "<tr>" + columns.map(c => `<td>${r[c] ?? ""}</td>`).join("") + "</tr>";
    }).join("");

    const nameIndex = columns.indexOf("name");
    if (nameIndex >= 0) {
      const nameTh = thead.querySelector(`th:nth-child(${nameIndex + 1})`);
      if (nameTh) nameTh.classList.add("name-col");
      tbody.querySelectorAll("tr").forEach(tr => {
        const td = tr.querySelector(`td:nth-child(${nameIndex + 1})`);
        if (td) td.classList.add("name-col");
      });
    }

  } catch (err) {
    document.getElementById("summary").innerText = "请求失败: " + err;
  }
});
</script>
</body>
</html>
